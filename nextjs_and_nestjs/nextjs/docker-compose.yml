version: '3.8'

services:
  node:
    build:
      context: .
      dockerfile: docker/node/Dockerfile
    tty: true
    working_dir: /workspace/nextjs_and_nestjs/nextjs
    volumes:
      - ../../.:/workspace
      - nextjs_and_nestjs_nextjs_node_modules:/workspace/nextjs_and_nestjs/nextjs/node_modules
    ports:
      - 127.0.0.1:80:80
volumes:
  nextjs_and_nestjs_nextjs_node_modules:
